<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TradingPal — Trade Detail</title>
  <style>
    :root {
      --bg-deep:     #06061a;
      --bg-card:     rgba(15, 15, 40, 0.85);
      --bg-glass:    rgba(255, 255, 255, 0.04);
      --border:      rgba(120, 80, 255, 0.25);
      --purple:      #7c3aed;
      --purple-glow: rgba(124, 58, 237, 0.45);
      --cyan:        #06d6f3;
      --cyan-glow:   rgba(6, 214, 243, 0.35);
      --green:       #00f5a0;
      --red:         #ff4d6d;
      --text:        #e2e8f0;
      --muted:       #7b85a3;
      --gold:        #fbbf24;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    #bg-frame { position: fixed; inset: 0; width: 100%; height: 100%; border: none; z-index: 0; pointer-events: none; }

    .shell { position: relative; z-index: 1; max-width: 1000px; margin: 0 auto; padding: 0 24px 80px; }

    /* ── Header ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 28px 0 20px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      display: flex; align-items: center; gap: 12px;
      font-size: 1.5rem; font-weight: 700; letter-spacing: .04em;
      color: var(--cyan); text-shadow: 0 0 18px var(--cyan-glow);
      text-decoration: none;
    }
    .logo svg { width: 36px; height: 36px; }
    .nav-pills { display: flex; gap: 8px; }
    .pill {
      padding: 6px 16px; border-radius: 999px; font-size: .8rem; font-weight: 600;
      border: 1px solid var(--border); background: var(--bg-glass);
      color: var(--muted); cursor: pointer; transition: all .2s;
      text-decoration: none; display: inline-block;
    }
    .pill:hover { border-color: var(--cyan); color: var(--cyan); box-shadow: 0 0 12px var(--cyan-glow); }
    .pill.active { border-color: var(--cyan); color: var(--cyan); background: rgba(6,214,243,.08); box-shadow: 0 0 12px var(--cyan-glow); }

    /* ── Back bar ── */
    .back-bar {
      display: flex; align-items: center; gap: 12px;
      margin: 32px 0 28px;
    }
    .back-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 18px; border-radius: 10px; font-size: .82rem; font-weight: 600;
      border: 1px solid var(--border); background: var(--bg-glass);
      color: var(--muted); cursor: pointer; text-decoration: none;
      transition: all .2s; backdrop-filter: blur(8px);
    }
    .back-btn:hover { border-color: var(--cyan); color: var(--cyan); box-shadow: 0 0 12px var(--cyan-glow); }

    /* ── Hero ── */
    .hero {
      display: flex; align-items: flex-start; justify-content: space-between;
      flex-wrap: wrap; gap: 20px;
      margin-bottom: 32px;
    }
    .hero-left { display: flex; flex-direction: column; gap: 10px; }
    .hero-symbol {
      font-size: 2.6rem; font-weight: 800; letter-spacing: .03em;
      color: var(--text); text-shadow: 0 0 30px rgba(6,214,243,.2);
    }
    .hero-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .badge {
      display: inline-block; padding: 4px 14px; border-radius: 8px;
      font-size: .78rem; font-weight: 700; letter-spacing: .05em;
    }
    .badge.long  { background: rgba(0,245,160,.12); color: var(--green); border: 1px solid rgba(0,245,160,.25); }
    .badge.short { background: rgba(255,77,109,.12); color: var(--red);   border: 1px solid rgba(255,77,109,.25); }
    .hero-date { font-size: .9rem; color: var(--muted); }

    .pnl-block { text-align: right; }
    .pnl-big {
      font-size: 2.8rem; font-weight: 800; letter-spacing: .02em;
    }
    .pnl-big.pos { color: var(--green); text-shadow: 0 0 30px rgba(0,245,160,.35); }
    .pnl-big.neg { color: var(--red);   text-shadow: 0 0 30px rgba(255,77,109,.35); }
    .pnl-label { font-size: .75rem; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; margin-top: 4px; }

    /* ── Stats grid ── */
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px; margin-bottom: 28px;
    }
    .stat-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 14px; padding: 18px 20px;
      backdrop-filter: blur(12px);
      display: flex; flex-direction: column; gap: 6px;
    }
    .stat-label { font-size: .65rem; color: var(--muted); letter-spacing: .12em; text-transform: uppercase; }
    .stat-value { font-size: 1.3rem; font-weight: 700; color: var(--text); }
    .stat-value.pos { color: var(--green); }
    .stat-value.neg { color: var(--red); }
    .stat-value.gold { color: var(--gold); }

    /* ── Screenshot ── */
    .section-title {
      font-size: .7rem; color: var(--muted); letter-spacing: .12em;
      text-transform: uppercase; margin-bottom: 12px; margin-top: 32px;
    }
    .screenshot-box {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 18px; overflow: hidden;
      backdrop-filter: blur(12px); margin-bottom: 28px;
    }
    .screenshot-box img {
      width: 100%; display: block; max-height: 520px; object-fit: contain;
      background: rgba(0,0,0,.3);
    }
    .no-screenshot-box {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 18px; padding: 60px 24px;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      color: var(--muted); backdrop-filter: blur(12px); margin-bottom: 28px;
    }
    .no-screenshot-box .icon { font-size: 3rem; opacity: .3; }
    .screenshot-actions {
      display: flex; gap: 12px; padding: 16px 20px;
      border-top: 1px solid var(--border);
    }
    .dl-btn {
      padding: 8px 18px; border-radius: 8px; font-size: .78rem; font-weight: 600;
      background: rgba(6,214,243,.1); border: 1px solid var(--cyan);
      color: var(--cyan); cursor: pointer; text-decoration: none;
      transition: background .2s;
    }
    .dl-btn:hover { background: rgba(6,214,243,.2); }

    /* ── Notes ── */
    .notes-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 14px; padding: 22px 24px;
      backdrop-filter: blur(12px); margin-bottom: 28px;
      line-height: 1.75; color: #c4cfe8; font-size: .9rem;
    }
    .notes-card .empty { color: var(--muted); font-style: italic; }

    /* ── Not found ── */
    .not-found {
      text-align: center; padding: 120px 24px;
    }
    .not-found .icon { font-size: 4rem; opacity: .3; margin-bottom: 20px; }
    .not-found h2 { font-size: 1.3rem; color: var(--text); margin-bottom: 10px; }
    .not-found p { color: var(--muted); font-size: .88rem; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 99px; }
  </style>
</head>
<body>

<iframe id="bg-frame" src="background.html"></iframe>

<div class="shell">

  <header>
    <a class="logo" href="index.html">
      <svg viewBox="0 0 36 36" fill="none">
        <circle cx="18" cy="18" r="17" stroke="#06d6f3" stroke-width="1.5" opacity=".4"/>
        <path d="M8 24 L14 14 L20 19 L26 10" stroke="#06d6f3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="26" cy="10" r="3" fill="#7c3aed"/>
        <path d="M18 4 L19 2 L20 4" fill="#fbbf24" opacity=".8"/>
        <path d="M28 8 L29 6 L30 8" fill="#fbbf24" opacity=".5"/>
      </svg>
      TradingPal
    </a>
    <nav class="nav-pills">
      <a class="pill" href="index.html">Dashboard</a>
      <a class="pill" href="analytics.html">Analytics</a>
      <a class="pill active" href="history.html">History</a>
    </nav>
  </header>

  <div id="content"></div>

</div>

<script>
function computePnL(t) {
  return (t.dir === 'LONG' ? 1 : -1) * (t.exit - t.entry) * t.size;
}
function fmt(n) { return (n >= 0 ? '+$' : '-$') + Math.abs(n).toFixed(2); }
function formatDate(d) {
  return new Date(d + 'T00:00:00').toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}

const params = new URLSearchParams(location.search);
const idx = parseInt(params.get('idx'), 10);
const trades = JSON.parse(localStorage.getItem('tp_trades') || '[]');
const t = trades[idx];
const content = document.getElementById('content');

if (!t || isNaN(idx)) {
  content.innerHTML = `
    <div class="not-found">
      <div class="icon">🌌</div>
      <h2>Trade not found</h2>
      <p>This trade may have been deleted or the link is invalid.</p>
      <a href="history.html" style="display:inline-block;margin-top:20px;padding:10px 22px;border-radius:10px;font-size:.85rem;font-weight:700;background:linear-gradient(135deg,var(--purple),#5b21b6);color:#fff;text-decoration:none;">Back to History</a>
    </div>`;
} else {
  const pnl = computePnL(t);
  const isWin = pnl > 0;
  const pct = ((t.exit - t.entry) / t.entry * (t.dir === 'LONG' ? 1 : -1) * 100).toFixed(2);
  const rr = t.stopLoss
    ? Math.abs((t.exit - t.entry) / (t.entry - t.stopLoss)).toFixed(2)
    : null;
  const notional = (t.entry * t.size).toFixed(2);

  document.title = `TradingPal — ${t.symbol.toUpperCase()} ${formatDate(t.date)}`;

  const screenshotHtml = t.screenshot
    ? `<div class="screenshot-box">
         <img src="${t.screenshot}" alt="Chart for ${t.symbol}" />
         <div class="screenshot-actions">
           <a class="dl-btn" href="${t.screenshot}" download="${t.symbol}_${t.date}.png">Download Chart</a>
         </div>
       </div>`
    : `<div class="no-screenshot-box">
         <div class="icon">📷</div>
         <div style="font-size:.88rem">No chart screenshot was uploaded for this trade.</div>
       </div>`;

  content.innerHTML = `
    <div class="back-bar">
      <a class="back-btn" href="history.html">← Back to History</a>
    </div>

    <div class="hero">
      <div class="hero-left">
        <div class="hero-symbol">${t.symbol.toUpperCase()}</div>
        <div class="hero-meta">
          <span class="badge ${t.dir.toLowerCase()}">${t.dir}</span>
          <span class="hero-date">${formatDate(t.date)}</span>
        </div>
      </div>
      <div class="pnl-block">
        <div class="pnl-big ${isWin ? 'pos' : 'neg'}">${fmt(pnl)}</div>
        <div class="pnl-label">Total P&amp;L</div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Entry Price</div>
        <div class="stat-value">$${(+t.entry).toFixed(2)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Exit Price</div>
        <div class="stat-value">$${(+t.exit).toFixed(2)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Position Size</div>
        <div class="stat-value">${t.size} units</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Notional Value</div>
        <div class="stat-value">$${notional}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Return %</div>
        <div class="stat-value ${isWin ? 'pos' : 'neg'}">${pct > 0 ? '+' : ''}${pct}%</div>
      </div>
      ${rr ? `<div class="stat-card">
        <div class="stat-label">Risk / Reward</div>
        <div class="stat-value gold">${rr}R</div>
      </div>` : ''}
    </div>

    <div class="section-title">Chart Screenshot</div>
    ${screenshotHtml}

    <div class="section-title">Trade Notes</div>
    <div class="notes-card">
      ${t.notes
        ? t.notes.replace(/\n/g, '<br>')
        : '<span class="empty">No notes were recorded for this trade.</span>'}
    </div>`;
}
</script>
</body>
</html>
