<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TradingPal — History</title>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-storage-compat.js"></script>
  <script src="firebase-app.js"></script>
  <style>
    :root {
      --bg-deep:     #080c14;
      --bg-card:     rgba(11, 17, 28, 0.97);
      --bg-glass:    rgba(255, 255, 255, 0.04);
      --border:      rgba(255, 255, 255, 0.07);
      --accent:      #2563eb;
      --blue:        #4191f7;
      --green:       #10b981;
      --red:         #ef4444;
      --text:        #e6edf3;
      --muted:       #8b949e;
      --gold:        #f59e0b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Animated Background ────────────────────────────────── */
    #bg-frame { position: fixed; inset: 0; width: 100%; height: 100%; border: none; z-index: 0; pointer-events: none; }

    /* ── Layout ────────────────────────────────────────────── */
    .shell { position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 0 24px 80px; }

    /* ── Header ────────────────────────────────────────────── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 28px 0 20px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      display: flex; align-items: center; gap: 12px;
      font-size: 1.5rem; font-weight: 700; letter-spacing: .04em;
      color: var(--blue);
      text-decoration: none;
    }
    .logo svg { width: 36px; height: 36px; }
    .nav-pills { display: flex; gap: 8px; }
    .pill {
      padding: 6px 16px; border-radius: 999px; font-size: .8rem; font-weight: 600;
      border: 1px solid var(--border); background: var(--bg-glass);
      color: var(--muted); cursor: pointer; transition: all .2s;
      text-decoration: none; display: inline-block;
    }
    .pill:hover { border-color: var(--blue); color: var(--blue); }
    .pill.active {
      border-color: var(--blue); color: var(--blue);
      background: rgba(59,130,246,.08);
    }

    /* ── Page title bar ────────────────────────────────────── */
    .page-bar {
      display: flex; align-items: flex-end; justify-content: space-between;
      margin: 36px 0 24px; flex-wrap: wrap; gap: 16px;
    }
    .page-title { font-size: 1.6rem; font-weight: 700; color: var(--text); }
    .page-sub   { font-size: .82rem; color: var(--muted); margin-top: 4px; }

    /* ── Filter bar ────────────────────────────────────────── */
    .filter-bar {
      display: flex; gap: 10px; flex-wrap: wrap;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 14px; padding: 14px 18px;
      backdrop-filter: blur(12px); margin-bottom: 28px;
      align-items: center;
    }
    .filter-bar input, .filter-bar select {
      background: rgba(255,255,255,.05); border: 1px solid var(--border);
      border-radius: 8px; padding: 7px 12px; color: var(--text);
      font-size: .82rem; font-family: inherit; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .filter-bar input:focus, .filter-bar select:focus {
      border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,.12);
    }
    .filter-bar select option { background: #161b22; }
    .filter-bar input[type="text"] { min-width: 180px; }
    .filter-bar input[type="date"] { min-width: 140px; }
    .filter-label { font-size: .7rem; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; white-space: nowrap; }
    .filter-group { display: flex; flex-direction: column; gap: 4px; }
    .filter-sep { width: 1px; background: var(--border); align-self: stretch; margin: 0 4px; }
    .clear-btn {
      padding: 7px 14px; border-radius: 8px; font-size: .78rem; font-weight: 600;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); cursor: pointer; transition: all .2s; white-space: nowrap;
    }
    .clear-btn:hover { border-color: var(--red); color: var(--red); }
    .sort-btn {
      padding: 7px 14px; border-radius: 8px; font-size: .78rem; font-weight: 600;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); cursor: pointer; transition: all .2s; white-space: nowrap;
    }
    .sort-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(37,99,235,.1); }

    /* ── Count bar ─────────────────────────────────────────── */
    .count-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 18px; font-size: .8rem; color: var(--muted);
    }
    .count-bar strong { color: var(--text); }

    /* ── Cards grid ────────────────────────────────────────── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    /* ── Trade card ────────────────────────────────────────── */
    .trade-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 18px; overflow: hidden;
      box-shadow: 0 2px 10px rgba(0,0,0,.4);
      backdrop-filter: blur(12px);
      transition: transform .2s, border-color .25s;
      display: flex; flex-direction: column; cursor: pointer;
    }
    .trade-card:hover {
      transform: translateY(-3px);
      border-color: rgba(65,145,247,.3);
      box-shadow: 0 8px 28px rgba(0,0,0,.5);
    }
    .trade-card.win  { border-color: rgba(16,185,129,.25); border-left: 3px solid rgba(16,185,129,.6); }
    .trade-card.loss { border-color: rgba(239,68,68,.2);   border-left: 3px solid rgba(239,68,68,.5); }

    /* Screenshot area */
    .card-screenshot {
      width: 100%; aspect-ratio: 16/7; overflow: hidden;
      background: rgba(22,27,34,.8);
      position: relative; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .card-screenshot img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform .3s;
    }
    .card-screenshot:hover img { transform: scale(1.03); }
    .no-screenshot {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      color: var(--muted); font-size: .75rem; pointer-events: none;
    }
    .no-screenshot .icon { font-size: 2rem; opacity: .3; }
    .ss-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0);
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .card-screenshot:hover .ss-overlay { background: rgba(0,0,0,.35); }
    .ss-overlay-icon {
      font-size: 2rem; opacity: 0; transform: scale(.8);
      transition: opacity .2s, transform .2s;
    }
    .card-screenshot:hover .ss-overlay-icon { opacity: 1; transform: scale(1); }

    /* Card body */
    .card-body { padding: 18px 20px; flex: 1; display: flex; flex-direction: column; gap: 12px; }

    .card-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .card-symbol { font-size: 1.25rem; font-weight: 700; letter-spacing: .02em; }
    .card-date   { font-size: .75rem; color: var(--muted); margin-top: 3px; }

    .pnl-chip {
      padding: 5px 12px; border-radius: 999px; font-size: .85rem; font-weight: 700;
      white-space: nowrap;
    }
    .pnl-chip.pos { background: rgba(16,185,129,.12); color: var(--green); }
    .pnl-chip.neg { background: rgba(239,68,68,.12); color: var(--red); }

    .card-details {
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
    }
    .detail-item { display: flex; flex-direction: column; gap: 2px; }
    .detail-label { font-size: .62rem; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; }
    .detail-value { font-size: .85rem; font-weight: 600; }

    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 6px;
      font-size: .7rem; font-weight: 700; letter-spacing: .04em;
    }
    .badge.long  { background: rgba(16,185,129,.12); color: var(--green); }
    .badge.short { background: rgba(239,68,68,.12); color: var(--red); }

    .card-notes {
      border-top: 1px solid rgba(48,54,61,.6); padding-top: 12px;
      font-size: .78rem; color: #9aa5be; line-height: 1.6;
    }
    .card-notes .notes-label {
      font-size: .62rem; color: var(--muted); letter-spacing: .1em;
      text-transform: uppercase; margin-bottom: 4px;
    }
    .card-notes .notes-text { font-style: italic; }
    .card-notes .no-notes { color: var(--muted); font-style: italic; }

    /* ── Empty state ───────────────────────────────────────── */
    .empty-state {
      grid-column: 1 / -1; text-align: center; padding: 80px 24px;
      color: var(--muted);
    }
    .empty-state .empty-icon { font-size: 3.5rem; margin-bottom: 16px; opacity: .4; }
    .empty-state p { font-size: .9rem; margin-top: 8px; }
    .empty-state a {
      display: inline-block; margin-top: 20px; padding: 10px 22px;
      border-radius: 10px; font-size: .85rem; font-weight: 700;
      background: var(--accent);
      color: #fff; text-decoration: none;
    }

    /* ── Lightbox ──────────────────────────────────────────── */
    .lightbox {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.88); backdrop-filter: blur(10px);
      align-items: center; justify-content: center; flex-direction: column;
      padding: 20px;
    }
    .lightbox.open { display: flex; }
    .lightbox-inner { position: relative; max-width: min(960px, 95vw); max-height: 80vh; width: 100%; }
    .lightbox-inner img {
      width: 100%; max-height: 75vh; object-fit: contain;
      border-radius: 14px; border: 1px solid var(--border);
    }
    .lightbox-caption {
      margin-top: 14px; display: flex; gap: 16px; align-items: center;
      font-size: .82rem; color: var(--muted); flex-wrap: wrap; justify-content: center;
    }
    .lightbox-caption strong { color: var(--text); }
    .lightbox-close {
      position: absolute; top: -14px; right: -14px;
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--accent); border: none; color: #fff;
      font-size: 1rem; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      transition: background .2s;
    }
    .lightbox-close:hover { background: var(--red); }
    .lightbox-dl {
      padding: 7px 16px; border-radius: 8px; font-size: .78rem; font-weight: 600;
      background: rgba(59,130,246,.1); border: 1px solid var(--blue);
      color: var(--blue); cursor: pointer; text-decoration: none;
    }
    .lightbox-dl:hover { background: rgba(59,130,246,.2); }

    /* ── Scrollbar ─────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 99px; }

    /* ── Edit modal ─────────────────────────────────────────── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,.75); backdrop-filter: blur(8px);
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 20px; padding: 32px 36px; width: min(620px, 100%);
      max-height: 88vh; overflow-y: auto;
      box-shadow: 0 24px 60px rgba(0,0,0,.5);
    }
    .modal h3 { font-size: 1.15rem; font-weight: 700; margin-bottom: 24px; color: var(--text); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label {
      font-size: .68rem; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--muted);
    }
    .form-group input, .form-group select, .form-group textarea {
      background: rgba(255,255,255,.05); border: 1px solid var(--border);
      border-radius: 9px; padding: 9px 12px; color: var(--text);
      font-size: .88rem; font-family: inherit; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,.12);
    }
    .form-group select option { background: #161b22; }
    .form-group textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; }
    .btn-cancel {
      padding: 10px 22px; border-radius: 10px; font-size: .85rem; font-weight: 600;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); cursor: pointer; transition: all .2s; font-family: inherit;
    }
    .btn-cancel:hover { border-color: var(--red); color: var(--red); }
    .submit-btn {
      padding: 10px 24px; border-radius: 10px; font-size: .85rem; font-weight: 700;
      border: none; background: var(--accent);
      color: #fff; cursor: pointer; font-family: inherit;
      transition: opacity .2s;
    }
    .submit-btn:hover { opacity: .88; }
    .submit-btn:disabled { opacity: .5; cursor: not-allowed; }
    .edit-ss-preview { margin-top: 10px; position: relative; display: none; }
    .edit-ss-preview img {
      width: 100%; max-height: 180px; object-fit: cover;
      border-radius: 10px; border: 1px solid var(--border);
    }
    .edit-ss-remove {
      position: absolute; top: 8px; right: 8px;
      background: rgba(255,77,109,.8); border: none; color: #fff;
      border-radius: 50%; width: 26px; height: 26px; font-size: .8rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .card-edit-btn {
      font-size: .72rem; color: var(--muted); font-weight: 600;
      background: none; border: 1px solid var(--border); border-radius: 6px;
      padding: 4px 10px; cursor: pointer; font-family: inherit;
      transition: all .2s;
    }
    .card-edit-btn:hover { border-color: var(--blue); color: var(--blue); }
  </style>
</head>
<body>

<div id="tp-auth-overlay" style="display:flex"></div>

<iframe id="bg-frame" src="background.html"></iframe>

<div class="shell">

  <!-- Header -->
  <header>
    <a class="logo" href="index.html">
      <svg viewBox="0 0 36 36" fill="none">
        <circle cx="18" cy="18" r="17" stroke="#3b82f6" stroke-width="1.5" opacity=".4"/>
        <path d="M8 24 L14 14 L20 19 L26 10" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="26" cy="10" r="3" fill="#2563eb"/>
      </svg>
      TradingPal
    </a>
    <nav class="nav-pills">
      <a class="pill" href="index.html">Dashboard</a>
      <a class="pill" href="analytics.html">Analytics</a>
      <a class="pill active" href="history.html">History</a>
      <a class="pill" href="settings.html">Settings</a>
    </nav>
  </header>

  <!-- Page title -->
  <div class="page-bar">
    <div>
      <div class="page-title">Trade History</div>
      <div class="page-sub">Every trade you have logged — with charts, notes, and full detail</div>
    </div>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar">
    <div class="filter-group">
      <div class="filter-label">Search</div>
      <input type="text" id="f-search" placeholder="Symbol…" oninput="applyFilters()" />
    </div>
    <div class="filter-sep"></div>
    <div class="filter-group">
      <div class="filter-label">Direction</div>
      <select id="f-dir" onchange="applyFilters()">
        <option value="">All</option>
        <option value="LONG">Long</option>
        <option value="SHORT">Short</option>
      </select>
    </div>
    <div class="filter-sep"></div>
    <div class="filter-group">
      <div class="filter-label">Result</div>
      <select id="f-result" onchange="applyFilters()">
        <option value="">All</option>
        <option value="win">Winners</option>
        <option value="loss">Losers</option>
      </select>
    </div>
    <div class="filter-sep"></div>
    <div class="filter-group">
      <div class="filter-label">From</div>
      <input type="date" id="f-from" oninput="applyFilters()" />
    </div>
    <div class="filter-group">
      <div class="filter-label">To</div>
      <input type="date" id="f-to" oninput="applyFilters()" />
    </div>
    <div class="filter-sep"></div>
    <div class="filter-group">
      <div class="filter-label">Sort</div>
      <select id="f-sort" onchange="applyFilters()">
        <option value="date-desc">Newest first</option>
        <option value="date-asc">Oldest first</option>
        <option value="pnl-desc">Best P&L</option>
        <option value="pnl-asc">Worst P&L</option>
      </select>
    </div>
    <button class="clear-btn" onclick="clearFilters()">Clear</button>
  </div>

  <!-- Count -->
  <div class="count-bar">
    <div id="count-label">Loading…</div>
    <div id="filtered-pnl" style="font-weight:600"></div>
  </div>

  <!-- Cards -->
  <div class="cards-grid" id="cards-grid"></div>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <div class="lightbox-inner">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <img id="lightbox-img" src="" alt="Trade chart" />
  </div>
  <div class="lightbox-caption">
    <div id="lightbox-meta"></div>
    <a id="lightbox-dl" class="lightbox-dl" download="chart.png">Download</a>
  </div>
</div>

<!-- ── Edit Trade Modal ─────────────────────────────────────────────────── -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3>✏️ Edit Trade</h3>
    <div class="form-grid">
      <div class="form-group">
        <label>Symbol</label>
        <input type="text" id="e-symbol" placeholder="e.g. BTCUSD" />
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="e-date" />
      </div>
      <div class="form-group">
        <label>Direction</label>
        <select id="e-dir">
          <option value="LONG">LONG</option>
          <option value="SHORT">SHORT</option>
        </select>
      </div>
      <div class="form-group">
        <label>Size (units)</label>
        <input type="number" id="e-size" placeholder="100" min="0" step="any" />
      </div>
      <div class="form-group">
        <label>Entry Price</label>
        <input type="number" id="e-entry" placeholder="0.00" step="any" />
      </div>
      <div class="form-group">
        <label>Exit Price</label>
        <input type="number" id="e-exit" placeholder="0.00" step="any" />
      </div>
      <div class="form-group">
        <label>Point / Tick Value (USD)</label>
        <input type="number" id="e-pointval" placeholder="1.00" step="any" value="1" />
      </div>
      <div class="form-group">
        <label>Realized P&amp;L (USD) <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:.65rem">— leave blank to auto-calculate</span></label>
        <input type="number" id="e-pnl" placeholder="Auto" step="any" />
      </div>
      <div class="form-group full">
        <label>Notes</label>
        <textarea id="e-notes" placeholder="What was your thesis? What did you learn?"></textarea>
      </div>
      <div class="form-group full">
        <label>Chart Screenshot</label>
        <input type="file" id="e-screenshot" accept="image/*" style="color:var(--muted);font-size:.82rem" />
        <div class="edit-ss-preview" id="e-ss-preview">
          <img id="e-ss-img" src="" alt="Current chart" />
          <button class="edit-ss-remove" onclick="removeEditScreenshot()" title="Remove screenshot">✕</button>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
      <button class="submit-btn" id="e-save-btn" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<script>

// ── Data ───────────────────────────────────────────────────────────────────
let trades = [];
let currentUser = null;

function computePnL(t) {
  return (t.dir === 'LONG' ? 1 : -1) * (t.exit - t.entry) * t.size;
}
function fmt(n) { return window.fmtPnL ? fmtPnL(n) : (n >= 0 ? '+$' : '-$') + Math.abs(n).toFixed(2); }

// ── Filters ────────────────────────────────────────────────────────────────
function applyFilters() {
  const search = document.getElementById('f-search').value.trim().toUpperCase();
  const dir    = document.getElementById('f-dir').value;
  const result = document.getElementById('f-result').value;
  const from   = document.getElementById('f-from').value;
  const to     = document.getElementById('f-to').value;
  const sort   = document.getElementById('f-sort').value;

  let filtered = trades.filter(t => {
    if (search && !t.symbol.toUpperCase().includes(search)) return false;
    if (dir && t.dir !== dir) return false;
    const pnl = computePnL(t);
    if (result === 'win'  && pnl <= 0) return false;
    if (result === 'loss' && pnl > 0)  return false;
    if (from && t.date < from) return false;
    if (to   && t.date > to)   return false;
    return true;
  });

  filtered.sort((a, b) => {
    if (sort === 'date-desc') return new Date(b.date) - new Date(a.date);
    if (sort === 'date-asc')  return new Date(a.date) - new Date(b.date);
    if (sort === 'pnl-desc')  return computePnL(b) - computePnL(a);
    if (sort === 'pnl-asc')   return computePnL(a) - computePnL(b);
    return 0;
  });

  renderCards(filtered);
}

function clearFilters() {
  document.getElementById('f-search').value = '';
  document.getElementById('f-dir').value = '';
  document.getElementById('f-result').value = '';
  document.getElementById('f-from').value = '';
  document.getElementById('f-to').value = '';
  document.getElementById('f-sort').value = 'date-desc';
  applyFilters();
}

// ── Render ─────────────────────────────────────────────────────────────────
function renderCards(list) {
  const grid = document.getElementById('cards-grid');
  const countEl = document.getElementById('count-label');
  const pnlEl   = document.getElementById('filtered-pnl');
  grid.innerHTML = '';

  const total = list.reduce((s, t) => s + computePnL(t), 0);
  countEl.innerHTML = `Showing <strong>${list.length}</strong> of <strong>${trades.length}</strong> trades`;
  if (list.length) {
    pnlEl.style.color = total >= 0 ? 'var(--green)' : 'var(--red)';
    pnlEl.textContent = 'Filtered P&L: ' + fmt(total);
  } else {
    pnlEl.textContent = '';
  }

  if (!list.length) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🌌</div>
        <div style="font-size:1.05rem;color:var(--text);font-weight:600">No trades found</div>
        <p>${trades.length ? 'Try adjusting your filters.' : 'Head back to the dashboard to log your first trade.'}</p>
        ${!trades.length ? '<a href="index.html">Go to Dashboard</a>' : ''}
      </div>`;
    return;
  }

  list.forEach((t, i) => {
    const realIdx = trades.indexOf(t);
    const pnl = computePnL(t);
    const isWin = pnl > 0;

    const card = document.createElement('div');
    card.className = `trade-card ${isWin ? 'win' : 'loss'}`;

    // Screenshot section
    const ssUrl = t.screenshotUrl || t.screenshot || null;
    const ssSection = ssUrl
      ? `<div class="card-screenshot" onclick="openLightbox('${t.id}')">
           <img src="${ssUrl}" alt="Chart for ${t.symbol}" loading="lazy" />
           <div class="ss-overlay"><div class="ss-overlay-icon">🔍</div></div>
         </div>`
      : `<div class="card-screenshot" style="cursor:default">
           <div class="no-screenshot">
             <div class="icon">📷</div>
             <span>No chart uploaded</span>
           </div>
         </div>`;

    card.innerHTML = `
      ${ssSection}
      <div class="card-body">
        <div class="card-top">
          <div>
            <div class="card-symbol">${t.symbol.toUpperCase()} <span class="badge ${t.dir.toLowerCase()}">${t.dir}</span></div>
            <div class="card-date">${formatDate(t.date)}</div>
          </div>
          <div class="pnl-chip ${isWin ? 'pos' : 'neg'}">${fmt(pnl)}</div>
        </div>

        <div class="card-details">
          <div class="detail-item">
            <div class="detail-label">Entry</div>
            <div class="detail-value">${fmtCur(+t.entry)}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Exit</div>
            <div class="detail-value">${fmtCur(+t.exit)}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Position Size</div>
            <div class="detail-value">${t.size} units</div>
          </div>
        </div>

        <div class="card-notes">
          <div class="notes-label">Notes</div>
          ${t.notes
            ? `<div class="notes-text">"${t.notes}"</div>`
            : `<div class="no-notes">No notes recorded for this trade.</div>`}
        </div>

        <div style="margin-top:14px;padding-top:12px;border-top:1px solid rgba(48,54,61,.6);display:flex;justify-content:space-between;align-items:center;">
          <button class="card-edit-btn" onclick="event.stopPropagation();editTrade('${t.id}')">✏️ Edit</button>
          <span style="font-size:.75rem;color:var(--blue);font-weight:600;letter-spacing:.04em;">View Full Details →</span>
        </div>
      </div>`;

    card.addEventListener('click', e => {
      if (e.target.closest('.card-screenshot')) return;
      location.href = `trade-detail.html?id=${t.id}`;
    });

    grid.appendChild(card);
  });
}

function formatDate(d) {
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

// ── Lightbox ───────────────────────────────────────────────────────────────
function openLightbox(tradeId) {
  const t   = trades.find(x => x.id === tradeId);
  if (!t) return;
  const pnl = computePnL(t);
  const ssUrl = t.screenshotUrl || t.screenshot || '';
  document.getElementById('lightbox-img').src = ssUrl;
  document.getElementById('lightbox-dl').href = ssUrl;
  document.getElementById('lightbox-dl').download = `${t.symbol}_${t.date}.png`;
  document.getElementById('lightbox-meta').innerHTML =
    `<strong>${t.symbol.toUpperCase()}</strong> &nbsp;·&nbsp; ${formatDate(t.date)} &nbsp;·&nbsp;
     <span style="color:${pnl>=0?'var(--green)':'var(--red)'}">${fmt(pnl)}</span>`;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

// ── Edit trade ─────────────────────────────────────────────────────────────
let editingTradeId = null;
let editPendingScreenshot = null;
let editScreenshotRemoved = false;

function editTrade(tradeId) {
  const t = trades.find(x => x.id === tradeId);
  if (!t) return;
  editingTradeId = tradeId;
  editPendingScreenshot = null;
  editScreenshotRemoved = false;

  document.getElementById('e-symbol').value   = t.symbol || '';
  document.getElementById('e-date').value      = t.date   || '';
  document.getElementById('e-dir').value       = t.dir    || 'LONG';
  document.getElementById('e-size').value      = t.size   || '';
  document.getElementById('e-entry').value     = t.entry  || '';
  document.getElementById('e-exit').value      = t.exit   || '';
  document.getElementById('e-pointval').value  = t.pointValue || 1;
  document.getElementById('e-pnl').value       = (t.realizedPnl !== null && t.realizedPnl !== undefined) ? t.realizedPnl : '';
  document.getElementById('e-notes').value     = t.notes  || '';
  document.getElementById('e-screenshot').value = '';

  const ssUrl = t.screenshotUrl || t.screenshot || null;
  const preview = document.getElementById('e-ss-preview');
  const img     = document.getElementById('e-ss-img');
  if (ssUrl) { img.src = ssUrl; preview.style.display = 'block'; }
  else         { preview.style.display = 'none'; }

  document.getElementById('edit-modal').classList.add('open');
}

function removeEditScreenshot() {
  editScreenshotRemoved = true;
  editPendingScreenshot = null;
  document.getElementById('e-ss-preview').style.display = 'none';
  document.getElementById('e-screenshot').value = '';
}

document.addEventListener('DOMContentLoaded', function () {
  document.getElementById('e-screenshot').addEventListener('change', function () {
    const file = this.files[0];
    if (!file) return;
    if (file.size > 3 * 1024 * 1024) { alert('Image must be under 3 MB.'); return; }
    const reader = new FileReader();
    reader.onload = e => {
      editPendingScreenshot = e.target.result;
      editScreenshotRemoved = false;
      document.getElementById('e-ss-img').src = editPendingScreenshot;
      document.getElementById('e-ss-preview').style.display = 'block';
    };
    reader.readAsDataURL(file);
  });
  document.getElementById('edit-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('edit-modal')) closeEditModal();
  });
});

async function saveEdit() {
  const sym   = document.getElementById('e-symbol').value.trim();
  const date  = document.getElementById('e-date').value;
  const dir   = document.getElementById('e-dir').value;
  const size  = parseFloat(document.getElementById('e-size').value);
  const entry = parseFloat(document.getElementById('e-entry').value);
  const exit  = parseFloat(document.getElementById('e-exit').value);
  if (!sym || !date || isNaN(size) || isNaN(entry) || isNaN(exit)) {
    alert('Please fill in all required fields.');
    return;
  }
  const pnlRaw      = parseFloat(document.getElementById('e-pnl').value);
  const realizedPnl = isNaN(pnlRaw) ? null : pnlRaw;
  const pointValue  = parseFloat(document.getElementById('e-pointval').value) || 1;
  const notes       = document.getElementById('e-notes').value.trim();

  const btn = document.getElementById('e-save-btn');
  btn.disabled = true;
  btn.textContent = editPendingScreenshot ? 'Uploading chart…' : 'Saving…';

  try {
    // 1. Save trade fields to Firestore immediately (no screenshot)
    btn.textContent = 'Saving…';
    const fields = { symbol: sym, date, dir, size, entry, exit, pointValue, realizedPnl, notes };
    if (editScreenshotRemoved) { fields.screenshotUrl = null; fields.hasScreenshot = false; }
    await TPDb.updateTrade(currentUser.uid, editingTradeId, fields);

    const idx = trades.findIndex(x => x.id === editingTradeId);
    if (idx !== -1) trades[idx] = { ...trades[idx], ...fields };

    // 2. Upload new screenshot separately so failure doesn't lose other edits
    if (editPendingScreenshot) {
      try {
        btn.textContent = 'Uploading 0%';
        const url = await TPDb.uploadScreenshot(currentUser.uid, editingTradeId, editPendingScreenshot, pct => {
          btn.textContent = `Uploading ${pct}%`;
        });
        await fbDb.collection('users').doc(currentUser.uid).collection('trades').doc(editingTradeId)
          .update({ screenshotUrl: url, hasScreenshot: true });
        if (idx !== -1) { trades[idx].screenshotUrl = url; trades[idx].hasScreenshot = true; }
      } catch (e) {
        console.error('Screenshot upload error:', e);
        TPToast('Changes saved — chart upload failed.\n' + e.message, 'warn');
      }
    }

    btn.disabled = false; btn.textContent = 'Save Changes';
    closeEditModal();
    applyFilters();
  } catch (e) {
    console.error('Edit save failed:', e);
    btn.disabled = false; btn.textContent = 'Save Changes';
    alert('Failed to save changes. Please try again.');
  }
}

function closeEditModal() {
  document.getElementById('edit-modal').classList.remove('open');
  editingTradeId = null;
  editPendingScreenshot = null;
  editScreenshotRemoved = false;
}

// ── Init ───────────────────────────────────────────────────────────────────
window.onTPReady = async function (user) {
  currentUser = user;
  trades = await TPDb.loadTrades(user.uid);
  applyFilters();
  const local = JSON.parse(localStorage.getItem('tp_trades') || '[]');
  if (local.length) TPMigrate.offer(user.uid, local);
};
</script>
