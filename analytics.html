<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TradingPal — Analytics</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg-deep:     #06061a;
      --bg-card:     rgba(15, 15, 40, 0.85);
      --bg-glass:    rgba(255, 255, 255, 0.04);
      --border:      rgba(120, 80, 255, 0.25);
      --purple:      #7c3aed;
      --purple-glow: rgba(124, 58, 237, 0.45);
      --cyan:        #06d6f3;
      --cyan-glow:   rgba(6, 214, 243, 0.35);
      --green:       #00f5a0;
      --green-dim:   rgba(0, 245, 160, 0.15);
      --red:         #ff4d6d;
      --red-dim:     rgba(255, 77, 109, 0.15);
      --text:        #e2e8f0;
      --muted:       #7b85a3;
      --gold:        #fbbf24;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    #bg-frame { position: fixed; inset: 0; width: 100%; height: 100%; border: none; z-index: 0; pointer-events: none; }

    .shell { position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 0 24px 80px; }

    /* ── Header ────────────────────────────────────────────── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 28px 0 20px; border-bottom: 1px solid var(--border);
    }
    .logo {
      display: flex; align-items: center; gap: 12px;
      font-size: 1.5rem; font-weight: 700; letter-spacing: .04em;
      color: var(--cyan); text-shadow: 0 0 18px var(--cyan-glow);
      text-decoration: none;
    }
    .logo svg { width: 36px; height: 36px; }
    .nav-pills { display: flex; gap: 8px; }
    .pill {
      padding: 6px 16px; border-radius: 999px; font-size: .8rem; font-weight: 600;
      border: 1px solid var(--border); background: var(--bg-glass);
      color: var(--muted); cursor: pointer; transition: all .2s;
      text-decoration: none; display: inline-block;
    }
    .pill:hover { border-color: var(--cyan); color: var(--cyan); box-shadow: 0 0 12px var(--cyan-glow); }
    .pill.active {
      border-color: var(--cyan); color: var(--cyan);
      background: rgba(6,214,243,.08); box-shadow: 0 0 12px var(--cyan-glow);
    }

    /* ── Page title ────────────────────────────────────────── */
    .page-bar { margin: 36px 0 32px; }
    .page-title { font-size: 1.6rem; font-weight: 700; }
    .page-sub   { font-size: .82rem; color: var(--muted); margin-top: 4px; }

    /* ── Empty state ───────────────────────────────────────── */
    .empty-state {
      text-align: center; padding: 100px 24px; color: var(--muted);
    }
    .empty-state .icon { font-size: 3.5rem; opacity: .35; margin-bottom: 16px; }
    .empty-state p { font-size: .9rem; margin-top: 8px; }
    .empty-state a {
      display: inline-block; margin-top: 20px; padding: 10px 22px;
      border-radius: 10px; font-size: .85rem; font-weight: 700;
      background: linear-gradient(135deg, var(--purple), #5b21b6);
      color: #fff; text-decoration: none; box-shadow: 0 0 16px var(--purple-glow);
    }

    /* ── Total P&L hero ────────────────────────────────────── */
    .hero-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 22px; padding: 36px 40px;
      backdrop-filter: blur(14px);
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 24px;
      margin-bottom: 24px;
      position: relative; overflow: hidden;
    }
    .hero-card::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 80% 50%, rgba(124,58,237,.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-label {
      font-size: .7rem; font-weight: 700; letter-spacing: .18em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
    }
    .hero-value {
      font-size: 3.2rem; font-weight: 800; letter-spacing: -.02em;
      line-height: 1;
    }
    .hero-value.up   { color: var(--green); text-shadow: 0 0 30px rgba(0,245,160,.4); }
    .hero-value.down { color: var(--red);   text-shadow: 0 0 30px rgba(255,77,109,.4); }
    .hero-sub { font-size: .82rem; color: var(--muted); margin-top: 8px; }
    .hero-chips { display: flex; gap: 12px; flex-wrap: wrap; }
    .hero-chip {
      padding: 8px 18px; border-radius: 10px; font-size: .82rem; font-weight: 600;
      border: 1px solid var(--border); background: var(--bg-glass);
      display: flex; flex-direction: column; gap: 2px;
    }
    .hero-chip-label { font-size: .62rem; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; }
    .hero-chip-val   { color: var(--text); }

    /* ── Main two-panel row ────────────────────────────────── */
    .panels-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    @media (max-width: 860px) { .panels-row { grid-template-columns: 1fr; } }

    /* ── Stat panel (stat left + doughnut right) ───────────── */
    .stat-panel {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 22px; padding: 30px 28px;
      backdrop-filter: blur(14px);
      display: flex; align-items: center; gap: 28px;
      position: relative; overflow: hidden;
      transition: box-shadow .25s;
    }
    .stat-panel:hover { box-shadow: 0 0 36px var(--purple-glow); }
    .stat-panel::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 20% 50%, rgba(6,214,243,.05) 0%, transparent 65%);
      pointer-events: none;
    }

    .panel-info { flex: 1; min-width: 0; }
    .panel-label {
      font-size: .65rem; font-weight: 700; letter-spacing: .18em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
    }
    .panel-value {
      font-size: 2.6rem; font-weight: 800; letter-spacing: -.02em; line-height: 1;
    }
    .panel-value.cyan { color: var(--cyan); text-shadow: 0 0 22px var(--cyan-glow); }
    .panel-value.gold { color: var(--gold); text-shadow: 0 0 22px rgba(251,191,36,.35); }
    .panel-value.green { color: var(--green); text-shadow: 0 0 22px rgba(0,245,160,.3); }
    .panel-value.red   { color: var(--red);   text-shadow: 0 0 22px rgba(255,77,109,.3); }

    .panel-breakdown { margin-top: 18px; display: flex; flex-direction: column; gap: 8px; }
    .breakdown-row { display: flex; justify-content: space-between; align-items: center; font-size: .8rem; }
    .breakdown-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; flex-shrink: 0; }
    .breakdown-label { color: var(--muted); display: flex; align-items: center; }
    .breakdown-val   { font-weight: 600; }

    .panel-chart { width: 140px; height: 140px; flex-shrink: 0; position: relative; }
    .chart-center-label {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; pointer-events: none;
    }
    .chart-center-label .c-val  { font-size: .95rem; font-weight: 700; color: var(--text); }
    .chart-center-label .c-sub  { font-size: .6rem; color: var(--muted); margin-top: 1px; }

    /* ── Extra stats row ───────────────────────────────────── */
    .extra-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    @media (max-width: 900px) { .extra-row { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 520px) { .extra-row { grid-template-columns: 1fr; } }

    .mini-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px 18px;
      backdrop-filter: blur(12px); transition: box-shadow .2s;
    }
    .mini-card:hover { box-shadow: 0 0 22px var(--purple-glow); }
    .mini-label { font-size: .65rem; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 8px; }
    .mini-value { font-size: 1.45rem; font-weight: 700; }
    .mini-value.up   { color: var(--green); }
    .mini-value.down { color: var(--red); }
    .mini-value.cyan { color: var(--cyan); }
    .mini-value.gold { color: var(--gold); }
    .mini-sub { font-size: .72rem; color: var(--muted); margin-top: 5px; }

    /* ── Streak + direction breakdown row ─────────────────── */
    .bottom-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 760px) { .bottom-row { grid-template-columns: 1fr; } }

    .info-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 20px; padding: 26px 24px;
      backdrop-filter: blur(12px);
    }
    .info-title {
      font-size: .65rem; font-weight: 700; letter-spacing: .18em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 18px;
    }

    /* Bar chart rows */
    .bar-row { margin-bottom: 14px; }
    .bar-row-top { display: flex; justify-content: space-between; font-size: .8rem; margin-bottom: 5px; }
    .bar-row-top .bl { color: var(--muted); }
    .bar-row-top .bv { font-weight: 600; }
    .bar-track { height: 6px; background: rgba(255,255,255,.06); border-radius: 99px; overflow: hidden; }
    .bar-fill  { height: 100%; border-radius: 99px; transition: width .6s cubic-bezier(.4,0,.2,1); }

    /* Streak display */
    .streak-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .streak-box {
      border-radius: 12px; padding: 16px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .streak-box.win-box  { background: var(--green-dim); border: 1px solid rgba(0,245,160,.2); }
    .streak-box.loss-box { background: var(--red-dim);   border: 1px solid rgba(255,77,109,.2); }
    .streak-n { font-size: 2rem; font-weight: 800; }
    .streak-box.win-box  .streak-n { color: var(--green); }
    .streak-box.loss-box .streak-n { color: var(--red); }
    .streak-desc { font-size: .72rem; color: var(--muted); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 99px; }
  </style>
</head>
<body>

<iframe id="bg-frame" src="background.html"></iframe>

<div class="shell">

  <!-- Header -->
  <header>
    <a class="logo" href="index.html">
      <svg viewBox="0 0 36 36" fill="none">
        <circle cx="18" cy="18" r="17" stroke="#06d6f3" stroke-width="1.5" opacity=".4"/>
        <path d="M8 24 L14 14 L20 19 L26 10" stroke="#06d6f3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="26" cy="10" r="3" fill="#7c3aed"/>
        <path d="M18 4 L19 2 L20 4" fill="#fbbf24" opacity=".8"/>
        <path d="M28 8 L29 6 L30 8" fill="#fbbf24" opacity=".5"/>
      </svg>
      TradingPal
    </a>
    <nav class="nav-pills">
      <a class="pill" href="index.html">Dashboard</a>
      <a class="pill active" href="analytics.html">Analytics</a>
      <a class="pill" href="history.html">History</a>
    </nav>
  </header>

  <!-- Page title -->
  <div class="page-bar">
    <div class="page-title">Analytics</div>
    <div class="page-sub">A deep-dive into your trading performance</div>
  </div>

  <!-- Content injected by JS -->
  <div id="content"></div>

</div>

<script>

/* ── Helpers ───────────────────────────────────────────────────────────── */
const trades = JSON.parse(localStorage.getItem('tp_trades') || '[]');

function pnl(t)  { return (t.dir==='LONG'?1:-1)*(t.exit-t.entry)*t.size; }
function fmt(n)  { return (n>=0?'+$':'-$')+Math.abs(n).toFixed(2); }
function fmtAbs(n){ return '$'+Math.abs(n).toFixed(2); }

/* ── Empty state ───────────────────────────────────────────────────────── */
if (!trades.length) {
  document.getElementById('content').innerHTML = `
    <div class="empty-state">
      <div class="icon">🌌</div>
      <div style="font-size:1.1rem;color:var(--text);font-weight:600">No data yet</div>
      <p>Log some trades on the dashboard and your analytics will appear here.</p>
      <a href="index.html">Go to Dashboard</a>
    </div>`;
} else {
  buildAnalytics();
}

/* ── Build page ────────────────────────────────────────────────────────── */
function buildAnalytics() {
  /* ── Core numbers ─── */
  const allPnl    = trades.map(pnl);
  const totalPnl  = allPnl.reduce((a,b)=>a+b, 0);
  const wins      = trades.filter((_,i)=>allPnl[i]>0);
  const losses    = trades.filter((_,i)=>allPnl[i]<=0);
  const winRate   = (wins.length/trades.length*100);
  const grossProfit = allPnl.filter(p=>p>0).reduce((a,b)=>a+b,0);
  const grossLoss   = Math.abs(allPnl.filter(p=>p<=0).reduce((a,b)=>a+b,0));
  const profitFactor = grossLoss ? (grossProfit/grossLoss) : Infinity;
  const avgWin    = wins.length   ? grossProfit/wins.length   : 0;
  const avgLoss   = losses.length ? grossLoss/losses.length   : 0;
  const bestPnl   = Math.max(...allPnl);
  const worstPnl  = Math.min(...allPnl);
  const avgTrade  = totalPnl/trades.length;

  /* ── Streaks ─── */
  let curWin=0,curLoss=0,maxWin=0,maxLoss=0;
  allPnl.forEach(p=>{
    if(p>0){ curWin++; curLoss=0; maxWin=Math.max(maxWin,curWin); }
    else   { curLoss++; curWin=0; maxLoss=Math.max(maxLoss,curLoss); }
  });

  /* ── Direction split ─── */
  const longT  = trades.filter(t=>t.dir==='LONG');
  const shortT = trades.filter(t=>t.dir==='SHORT');
  const longPnl  = longT.reduce((s,t)=>s+pnl(t),0);
  const shortPnl = shortT.reduce((s,t)=>s+pnl(t),0);
  const longWR   = longT.length  ? longT.filter(t=>pnl(t)>0).length/longT.length*100  : 0;
  const shortWR  = shortT.length ? shortT.filter(t=>pnl(t)>0).length/shortT.length*100 : 0;
  const maxDirPnl = Math.max(Math.abs(longPnl), Math.abs(shortPnl), 1);

  /* ── Inject HTML ─── */
  document.getElementById('content').innerHTML = `

    <!-- Hero: Total P&L -->
    <div class="hero-card">
      <div>
        <div class="hero-label">Total P &amp; L</div>
        <div class="hero-value ${totalPnl>=0?'up':'down'}">${fmt(totalPnl)}</div>
        <div class="hero-sub">${trades.length} trades recorded &nbsp;·&nbsp; Avg ${fmt(avgTrade)} per trade</div>
      </div>
      <div class="hero-chips">
        <div class="hero-chip">
          <div class="hero-chip-label">Gross Profit</div>
          <div class="hero-chip-val" style="color:var(--green)">+$${grossProfit.toFixed(2)}</div>
        </div>
        <div class="hero-chip">
          <div class="hero-chip-label">Gross Loss</div>
          <div class="hero-chip-val" style="color:var(--red)">-$${grossLoss.toFixed(2)}</div>
        </div>
        <div class="hero-chip">
          <div class="hero-chip-label">Best Trade</div>
          <div class="hero-chip-val" style="color:var(--gold)">+$${bestPnl.toFixed(2)}</div>
        </div>
        <div class="hero-chip">
          <div class="hero-chip-label">Worst Trade</div>
          <div class="hero-chip-val" style="color:var(--red)">-$${Math.abs(worstPnl).toFixed(2)}</div>
        </div>
      </div>
    </div>

    <!-- Win Rate + Profit Factor panels -->
    <div class="panels-row">

      <!-- Win Rate -->
      <div class="stat-panel">
        <div class="panel-info">
          <div class="panel-label">Win Rate</div>
          <div class="panel-value ${winRate>=50?'green':'red'}">${winRate.toFixed(1)}%</div>
          <div class="panel-breakdown">
            <div class="breakdown-row">
              <div class="breakdown-label"><span class="breakdown-dot" style="background:var(--green)"></span>Winning trades</div>
              <div class="breakdown-val" style="color:var(--green)">${wins.length}</div>
            </div>
            <div class="breakdown-row">
              <div class="breakdown-label"><span class="breakdown-dot" style="background:var(--red)"></span>Losing trades</div>
              <div class="breakdown-val" style="color:var(--red)">${losses.length}</div>
            </div>
            <div class="breakdown-row">
              <div class="breakdown-label"><span class="breakdown-dot" style="background:var(--muted)"></span>Total trades</div>
              <div class="breakdown-val">${trades.length}</div>
            </div>
            <div class="breakdown-row" style="margin-top:4px;border-top:1px solid rgba(120,80,255,.1);padding-top:8px">
              <div class="breakdown-label">Avg win</div>
              <div class="breakdown-val" style="color:var(--green)">+$${avgWin.toFixed(2)}</div>
            </div>
            <div class="breakdown-row">
              <div class="breakdown-label">Avg loss</div>
              <div class="breakdown-val" style="color:var(--red)">-$${avgLoss.toFixed(2)}</div>
            </div>
          </div>
        </div>
        <div class="panel-chart">
          <canvas id="winChart"></canvas>
          <div class="chart-center-label">
            <div class="c-val">${winRate.toFixed(0)}%</div>
            <div class="c-sub">wins</div>
          </div>
        </div>
      </div>

      <!-- Profit Factor -->
      <div class="stat-panel">
        <div class="panel-info">
          <div class="panel-label">Profit Factor</div>
          <div class="panel-value ${profitFactor>=1?'gold':'red'}">
            ${profitFactor===Infinity ? '∞' : profitFactor.toFixed(2)}
          </div>
          <div style="font-size:.73rem;color:var(--muted);margin-top:6px;line-height:1.5">
            ${profitFactor>=2   ? 'Excellent — strong edge confirmed.' :
              profitFactor>=1.5 ? 'Good — solid edge, keep consistent.' :
              profitFactor>=1   ? 'Marginal — refine your setups to improve.' :
                                  'Below 1 — losses outweigh profits, review strategy.'}
          </div>
          <div class="panel-breakdown" style="margin-top:14px">
            <div class="breakdown-row">
              <div class="breakdown-label"><span class="breakdown-dot" style="background:var(--green)"></span>Total profits</div>
              <div class="breakdown-val" style="color:var(--green)">+$${grossProfit.toFixed(2)}</div>
            </div>
            <div class="breakdown-row">
              <div class="breakdown-label"><span class="breakdown-dot" style="background:var(--red)"></span>Total losses</div>
              <div class="breakdown-val" style="color:var(--red)">-$${grossLoss.toFixed(2)}</div>
            </div>
            <div class="breakdown-row" style="margin-top:4px;border-top:1px solid rgba(120,80,255,.1);padding-top:8px">
              <div class="breakdown-label">Risk / Reward</div>
              <div class="breakdown-val">${avgLoss?( avgWin/avgLoss).toFixed(2):'∞'} : 1</div>
            </div>
          </div>
        </div>
        <div class="panel-chart">
          <canvas id="pfChart"></canvas>
          <div class="chart-center-label">
            <div class="c-val">${profitFactor===Infinity?'∞':profitFactor.toFixed(1)}</div>
            <div class="c-sub">factor</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Extra mini stats -->
    <div class="extra-row">
      <div class="mini-card">
        <div class="mini-label">Average Win</div>
        <div class="mini-value up">+$${avgWin.toFixed(2)}</div>
        <div class="mini-sub">per winning trade</div>
      </div>
      <div class="mini-card">
        <div class="mini-label">Average Loss</div>
        <div class="mini-value down">-$${avgLoss.toFixed(2)}</div>
        <div class="mini-sub">per losing trade</div>
      </div>
      <div class="mini-card">
        <div class="mini-label">Best Trade</div>
        <div class="mini-value up">+$${bestPnl.toFixed(2)}</div>
        <div class="mini-sub">${trades[allPnl.indexOf(bestPnl)]?.symbol?.toUpperCase() ?? '—'}</div>
      </div>
      <div class="mini-card">
        <div class="mini-label">Worst Trade</div>
        <div class="mini-value down">-$${Math.abs(worstPnl).toFixed(2)}</div>
        <div class="mini-sub">${trades[allPnl.indexOf(worstPnl)]?.symbol?.toUpperCase() ?? '—'}</div>
      </div>
    </div>

    <!-- Streaks + Direction split -->
    <div class="bottom-row">
      <div class="info-card">
        <div class="info-title">Win / Loss Streaks</div>
        <div class="streak-grid">
          <div class="streak-box win-box">
            <div class="streak-n">${maxWin}</div>
            <div class="streak-desc">Longest winning streak</div>
          </div>
          <div class="streak-box loss-box">
            <div class="streak-n">${maxLoss}</div>
            <div class="streak-desc">Longest losing streak</div>
          </div>
        </div>
      </div>

      <div class="info-card">
        <div class="info-title">Long vs Short Performance</div>
        ${longT.length ? `
        <div class="bar-row">
          <div class="bar-row-top">
            <span class="bl">LONG (${longT.length} trades)</span>
            <span class="bv" style="color:${longPnl>=0?'var(--green)':'var(--red)'}">${fmt(longPnl)} &nbsp; WR ${longWR.toFixed(0)}%</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${(Math.abs(longPnl)/maxDirPnl*100).toFixed(1)}%;background:${longPnl>=0?'var(--green)':'var(--red)'}"></div>
          </div>
        </div>` : ''}
        ${shortT.length ? `
        <div class="bar-row">
          <div class="bar-row-top">
            <span class="bl">SHORT (${shortT.length} trades)</span>
            <span class="bv" style="color:${shortPnl>=0?'var(--green)':'var(--red)'}">${fmt(shortPnl)} &nbsp; WR ${shortWR.toFixed(0)}%</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${(Math.abs(shortPnl)/maxDirPnl*100).toFixed(1)}%;background:${shortPnl>=0?'var(--green)':'var(--red)'}"></div>
          </div>
        </div>` : ''}
        ${!longT.length && !shortT.length ? '<div style="color:var(--muted);font-size:.82rem">No directional data yet.</div>' : ''}
      </div>
    </div>
  `;

  /* ── Win Rate doughnut ─── */
  new Chart(document.getElementById('winChart'), {
    type: 'doughnut',
    data: {
      labels: ['Wins', 'Losses'],
      datasets: [{
        data: [wins.length || 0.001, losses.length || 0.001],
        backgroundColor: ['rgba(0,245,160,0.85)', 'rgba(255,77,109,0.75)'],
        borderColor:     ['rgba(0,245,160,0.3)',  'rgba(255,77,109,0.3)'],
        borderWidth: 1,
        hoverOffset: 6
      }]
    },
    options: {
      cutout: '68%',
      responsive: true, maintainAspectRatio: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(15,15,40,.95)',
          borderColor: 'rgba(120,80,255,.35)', borderWidth: 1,
          titleColor: '#06d6f3', bodyColor: '#e2e8f0',
          callbacks: { label: c => ` ${c.label}: ${c.parsed} (${(c.parsed/trades.length*100).toFixed(1)}%)` }
        }
      }
    }
  });

  /* ── Profit Factor doughnut ─── */
  const pfWin  = grossProfit || 0.001;
  const pfLoss = grossLoss   || 0.001;
  new Chart(document.getElementById('pfChart'), {
    type: 'doughnut',
    data: {
      labels: ['Gross Profit', 'Gross Loss'],
      datasets: [{
        data: [pfWin, pfLoss],
        backgroundColor: ['rgba(251,191,36,0.8)', 'rgba(255,77,109,0.7)'],
        borderColor:     ['rgba(251,191,36,0.3)', 'rgba(255,77,109,0.3)'],
        borderWidth: 1,
        hoverOffset: 6
      }]
    },
    options: {
      cutout: '68%',
      responsive: true, maintainAspectRatio: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(15,15,40,.95)',
          borderColor: 'rgba(120,80,255,.35)', borderWidth: 1,
          titleColor: '#06d6f3', bodyColor: '#e2e8f0',
          callbacks: { label: c => ` ${c.label}: $${c.parsed.toFixed(2)}` }
        }
      }
    }
  });
}
</script>
</body>
</html>
